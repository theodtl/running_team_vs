name: Deploy GitHub Pages

# Refreshes Strava data and republishes the static GitHub Pages site.
on:
  push:
    branches:
      - main
    paths-ignore:
      - "data/teams.xlsx"
      - "data/processed_activities.xlsx"
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh Strava data
        env:
          STRAVA_ACCESS_TOKEN: ${{ secrets.STRAVA_ACCESS_TOKEN }}
          CLUB_ID: ${{ vars.CLUB_ID }}
        run: python update_activities.py

      - name: Save refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/teams.xlsx data/processed_activities.xlsx
          git diff --cached --quiet || git commit -m "Update Strava data [skip ci]"
          git push

      - name: Build static site
        run: python build_static.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
